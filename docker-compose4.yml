version: '3.8'

services:
  postgres_oltp:
    image: postgres:15-alpine
    container_name: postgres_oltp
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: bionicpro_oltp
    volumes:
      - postgres_oltp_data:/var/lib/postgresql/data
      # Прокидываем папку со скриптами инициализации
      - ./postgres_oltp-init:/docker-entrypoint-initdb.d
    # подготовка к логической репликации через debezium
    command: [
      "postgres",
      "-c", "wal_level=logical",
      "-c", "max_replication_slots=4",
      "-c", "max_wal_senders=4"
    ]
    networks:
      - bionicpro-network

  keycloak_db:
    image: postgres:14
    container_name: keycloak_db
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - bionicpro-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.1
    platform: linux/arm64
    container_name: keycloak
    env_file:
      - ./keycloak/.env.secrets
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
      KC_HEALTH_ENABLED: "true"
    command: 
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realm-export2.1_full_ldap_ya_oauth.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    depends_on:
      - keycloak_db
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bionicpro-network

  frontend:
    build:
      context: ./frontend_bff
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BFF_URL: http://localhost:8081/api
    networks:
      - bionicpro-network

  bionicpro-auth:
    build:
      context: ./bionicpro-auth
      dockerfile: Dockerfile
    container_name: bionicpro-auth
    ports:
      - "8081:8081"
    environment:
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET=1h3WfuhlvdQyMNqkz4SSNPZpMyt8sCT7
      - SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI=http://keycloak:8080/realms/reports-realm
      - REPORTS_BACKEND_URL=http://bionicpro-reports:8082
    depends_on:
      keycloak:
        condition: service_healthy
      openldap:
          condition: service_started
    networks:
      - bionicpro-network

  bionicpro-reports:
    build:
      context: ./bionicpro-reports
      dockerfile: Dockerfile
    container_name: bionicpro-reports
    ports:
      - "8082:8082"
    env_file:
      - ./keycloak/.env.secrets
    environment:
      - DB_URL=jdbc:clickhouse://clickhouse:8123/bionicpro_olap
      - DB_USER=admin
      - DB_PASSWORD=admin_password
      - JWT_ISSUER_URI=http://keycloak:8080/realms/reports-realm
      # Явные настройки MinIO
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=admin_password
      - MINIO_BUCKET=reports
      # Ссылка на CDN для фронтенда
      - CDN_BASE_URL=http://localhost:8095/cdn
    depends_on:
      clickhouse:
        condition: service_started
      keycloak:
        condition: service_healthy
      openldap:
        condition: service_started
    networks:
      - bionicpro-network

  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    platform: linux/arm64
    ports:
      - "389:389"
      - "636:636"
    environment:
      LDAP_DOMAIN: "example.com"
      LDAP_ADMIN_PASSWORD: "adminpassword"
    command: --copy-service
    volumes:
      - ./ldap/config.ldif:/container/service/slapd/assets/config/bootstrap/ldif/01-custom-data.ldif
    networks:
      - bionicpro-network

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: clickhouse
    ports:
      - "8123:8123" # HTTP интерфейс (для API и UI)
      - "9100:9000" # Native интерфейс (для некоторых драйверов)
    environment:
      CLICKHOUSE_DB: bionicpro_olap
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin_password
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d
    networks:
      - bionicpro-network

  # Объектное хранилище MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9200:9000" # Порт для S3 API
      - "9201:9001" # Порт для Web UI (Админки)
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - bionicpro-network

  # Контейнер для автоматической настройки MinIO (чтобы не создавать бакет руками)
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      - minio
    networks:
      - bionicpro-network
    entrypoint: >
      /bin/sh -c "
      sleep 5; 
      mc alias set myminio http://minio:9000 admin admin_password;
      mc mb myminio/reports || true; 
      mc anonymous set download myminio/reports; 
      exit 0;
      "

  # Nginx в роли эмулятора CDN с кэшированием
  nginx-cdn:
    image: nginx:alpine
    container_name: nginx-cdn
    ports:
      - "8095:80" # Фронтенд будет стучаться сюда
    volumes:
      - ./nginx_cdn/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cdn_cache:/var/cache/nginx
    depends_on:
      - minio
    networks:
      - bionicpro-network

  kafka:
    image: apache/kafka:3.7.0
#    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # Настройки для работы в один узел (без репликации):
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - bionicpro-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8180:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - bionicpro-network

  debezium_oltp:
    image: quay.io/debezium/connect:3.4 # Официальный образ с коннекторами
    container_name: debezium_oltp
    depends_on:
      - kafka
      - postgres_oltp
    ports:
      - "8083:8083" # Порт для отправки REST-запросов на создание коннекторов
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    networks:
      - bionicpro-network

  debezium_init:
    image: curlimages/curl:latest
    container_name: debezium_init
    depends_on:
      - debezium_oltp
    volumes:
      - ./debezium/postgres_oltp-connector.json:/tmp/postgres_oltp-connector.json
    # Скрипт ждет 200 OK от Debezium, а затем делает POST-запрос с конфигом
    networks:
      - bionicpro-network
    command: >
      sh -c "
        echo 'Ожидаем запуска Debezium API...'
        # Пингуем эндпоинт, пока не получим HTTP 200
        while [ $$(curl -s -o /dev/null -w %{http_code} http://debezium_oltp:8083/connectors) -ne 200 ] ; do 
          echo 'Debezium еще не готов, ждем 2 секунды...'
          sleep 2
        done
        echo 'Debezium API доступен!'

        # Проверяем статус коннектора
        STATUS=$$(curl -s -o /dev/null -w %{http_code} http://debezium_oltp:8083/connectors/postgres_oltp-connector)

        if [ $$STATUS -eq 404 ]; then
          echo 'Коннектор postgres_oltp-connector не найден. Отправляем конфиг...'
          
          curl -X POST -H 'Content-Type: application/json' --data @/tmp/postgres_oltp-connector.json http://debezium_oltp:8083/connectors
          echo '\nКонец регистрации коннектора'
        else
          echo 'Коннектор postgres_oltp-connector уже существует (статус HTTP '$$STATUS'). Пропускаем создание.'
        fi
      "       

networks:
  bionicpro-network:
    name: bionicpro-network
    driver: bridge

volumes:
  keycloak_db_data:
  postgres_oltp_data:
  clickhouse_data:
  minio_data:
  nginx_cdn_cache:
  kafka_data:
